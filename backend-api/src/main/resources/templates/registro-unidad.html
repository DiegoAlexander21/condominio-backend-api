<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Unidad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/registro-unidad.css}" />
    <script defer th:src="@{/js/validaciones.js}"></script>
    <script defer th:src="@{/js/registro-unidad.js}"></script>
  </head>
  <body>
    <header class="encabezado">
      <div class="contenedor encabezado-contenido">
        <nav>
          <a class="enlace-volver" th:href="@{/gestion-unidades}">&larr; Volver a gestión</a>
        </nav>
        <div>
          <h1 th:text="${esEdicion} ? 'Editar Unidad' : 'Registro de Unidad'">Registro de Unidad</h1>
          <p>Ingresa los datos de la unidad, propietario y residente.</p>
        </div>
      </div>
    </header>

    <main class="contenedor pagina">
      <section th:if="${successMessage != null or errorMessage != null}">
        <p
          class="alerta alerta-exito"
          th:if="${successMessage != null}"
          th:text="${successMessage}"
        ></p>
        <p
          class="alerta alerta-error"
          th:if="${errorMessage != null}"
          th:text="${errorMessage}"
        ></p>
      </section>

      <section class="panel">
        <div class="panel-cabecera">
          <h2 th:text="${esEdicion} ? 'Editar unidad' : 'Datos de la unidad'">Datos de la unidad</h2>
        </div>

        <form
          id="formularioUnidad"
          th:action="@{/gestion-unidades/unidad}"
          th:object="${unidadForm}"
          method="post"
          novalidate
        >
          <input type="hidden" th:field="*{id}" />

          <fieldset class="grupo-seccion">
            <legend>Datos de la Unidad</legend>
            <div class="grupo-campos">
              <div class="fila-campos">
                <div class="campo">
                  <label for="nombreCondominio">Condominio</label>
                  <select id="nombreCondominio" th:field="*{nombreCondominio}" required>
                    <option value="">Seleccione un condominio</option>
                    <option value="Condominio Mirador">Condominio Mirador</option>
                    <option value="Residencial Los Pinos">Residencial Los Pinos</option>
                    <option value="Condominio Las Acacias">Condominio Las Acacias</option>
                  </select>
                </div>
                <div class="campo">
                  <label for="numeroUnidad">Número de unidad</label>
                  <input
                    id="numeroUnidad"
                    type="text"
                    th:field="*{numeroUnidad}"
                    placeholder="Ej: A-101"
                    minlength="2"
                    maxlength="20"
                    required
                  />
                </div>
              </div>
              <div class="fila-campos">
                <div class="campo">
                  <label for="torre">Torre</label>
                  <select id="torre" th:field="*{torre}" required>
                    <option value="">Seleccione torre</option>
                    <option value="Torre A">Torre A</option>
                    <option value="Torre B">Torre B</option>
                    <option value="Torre C">Torre C</option>
                  </select>
                </div>
                <div class="campo">
                  <label for="piso">Piso</label>
                  <input
                    id="piso"
                    type="number"
                    th:field="*{piso}"
                    min="1"
                    max="50"
                    placeholder="Ej: 5"
                    required
                  />
                </div>
              </div>
              <div class="fila-campos">
                <div class="campo">
                  <label for="area">Área (m²)</label>
                  <input
                    id="area"
                    type="number"
                    th:field="*{area}"
                    min="10"
                    step="0.01"
                    placeholder="Ej: 85.5"
                    required
                  />
                </div>
                <div class="campo">
                  <label for="residenteActivo">Estado</label>
                  <select id="residenteActivo" th:field="*{residenteActivo}" required>
                    <option value="true">Ocupada</option>
                    <option value="false">Disponible</option>
                  </select>
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="grupo-seccion">
            <legend>Datos del Propietario</legend>
            <div class="grupo-campos">
              <div class="fila-campos">
                <div class="campo">
                  <label for="nombrePropietario">Nombre completo</label>
                  <input
                    id="nombrePropietario"
                    type="text"
                    th:field="*{nombrePropietario}"
                    placeholder="Ej: Tony Stark"
                    minlength="5"
                    maxlength="100"
                    required
                  />
                </div>
                <div class="campo">
                  <label for="dniPropietario">DNI</label>
                  <input
                    id="dniPropietario"
                    type="text"
                    th:field="*{dniPropietario}"
                    placeholder="Ej: 12345678"
                    minlength="8"
                    maxlength="12"
                    required
                  />
                </div>
              </div>
              <div class="fila-campos">
                <div class="campo">
                  <label for="emailPropietario">Email</label>
                  <input
                    id="emailPropietario"
                    type="email"
                    th:field="*{emailPropietario}"
                    placeholder="Ej: tony@gmail.com"
                    maxlength="100"
                    required
                  />
                </div>
                <div class="campo">
                  <label for="telefonoPropietario">Teléfono</label>
                  <input
                    id="telefonoPropietario"
                    type="tel"
                    th:field="*{telefonoPropietario}"
                    placeholder="Ej: 987654321"
                    minlength="9"
                    maxlength="12"
                    required
                  />
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset class="grupo-seccion">
            <legend>Datos del Residente (opcional)</legend>
            <div class="grupo-campos">
              <div class="fila-campos">
                <div class="campo">
                  <label for="nombreResidente">Nombre completo</label>
                  <input
                    id="nombreResidente"
                    type="text"
                    th:field="*{nombreResidente}"
                    placeholder="Ej: Peter Parker"
                    minlength="3"
                    maxlength="100"
                  />
                </div>
                <div class="campo">
                  <label for="dniResidente">DNI</label>
                  <input
                    id="dniResidente"
                    type="text"
                    th:field="*{dniResidente}"
                    placeholder="Ej: 87654321"
                    minlength="8"
                    maxlength="12"
                  />
                </div>
              </div>
              <div class="fila-campos">
                <div class="campo">
                  <label for="parentesco">Parentesco</label>
                  <select id="parentesco" th:field="*{parentesco}">
                    <option value="">Seleccione parentesco</option>
                    <option value="Cónyuge">Cónyuge</option>
                    <option value="Hijo(a)">Hijo(a)</option>
                    <option value="Padre/Madre">Padre/Madre</option>
                    <option value="Hermano(a)">Hermano(a)</option>
                    <option value="Otro">Otro</option>
                  </select>
                </div>
                <div class="campo"></div>
              </div>
            </div>
          </fieldset>

          <div class="acciones-panel">
            <button
              type="submit"
              class="boton-principal"
              th:text="${esEdicion} ? 'Actualizar unidad' : 'Guardar unidad'"
            >Guardar unidad</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="pie-pagina">
      <p>Todos los derechos reservados - Gestión de Unidades</p>
    </footer>
  </body>
</html>
