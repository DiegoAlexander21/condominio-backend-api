<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Condominio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/registro-condominio.css}" />
    <script defer th:src="@{/js/validaciones.js}"></script>
    <script defer th:src="@{/js/registro-condominio.js}"></script>
  </head>
  <body>
    <header class="encabezado">
      <div class="contenedor encabezado-contenido">
        <nav>
          <a class="enlace-volver" th:href="@{/gestion-condominio}">&larr; Volver a gestión</a>
        </nav>
        <div>
          <h1>Registro de Condominio</h1>
          <p>Ingresa los datos base para crear o actualizar un condominio.</p>
        </div>
      </div>
    </header>

    <main class="contenedor pagina">
      <section th:if="${successMessage != null or errorMessage != null}">
        <p
          class="alerta alerta-exito"
          th:if="${successMessage != null}"
          th:text="${successMessage}"
        ></p>
        <p
          class="alerta alerta-error"
          th:if="${errorMessage != null}"
          th:text="${errorMessage}"
        ></p>
      </section>

      <section class="panel">
        <div class="panel-cabecera">
          <h2>Datos del condominio</h2>
        </div>

        <form
          id="formularioCondominio"
          th:action="@{/gestion-condominio/condominio}"
          th:object="${condominioForm}"
          method="post"
          novalidate
        >
          <div class="grupo-campos">
            <div class="campo">
              <label for="nombreCondominio">Nombre del condominio</label>
              <input
                id="nombreCondominio"
                type="text"
                th:field="*{nombre}"
                placeholder="Ejemplo: Condominio Mirador"
                minlength="2"
                maxlength="80"
                required
              />
              <small
                class="error-campo"
                th:if="${#fields.hasErrors('nombre')}"
                th:errors="*{nombre}"
              ></small>
            </div>

            <div class="fila-campos">
              <div class="campo">
                <label for="torres">Número de torres</label>
                <input
                  id="torres"
                  type="number"
                  th:field="*{torres}"
                  min="1"
                  max="100"
                  required
                />
                <small
                  class="error-campo"
                  th:if="${#fields.hasErrors('torres')}"
                  th:errors="*{torres}"
                ></small>
              </div>
              <div class="campo">
                <label for="pisosPorTorre">Pisos por torre</label>
                <input
                  id="pisosPorTorre"
                  type="number"
                  th:field="*{pisosPorTorre}"
                  min="1"
                  max="200"
                  required
                />
                <small
                  class="error-campo"
                  th:if="${#fields.hasErrors('pisosPorTorre')}"
                  th:errors="*{pisosPorTorre}"
                ></small>
              </div>
            </div>
          </div>

          <div class="acciones-panel">
            <button type="submit" class="boton-principal">
              Guardar condominio
            </button>
          </div>
        </form>
      </section>
    </main>

    <footer class="pie-pagina">
      <p>Todos los derechos reservados - Gestión de Condominio</p>
    </footer>
  </body>
</html>
