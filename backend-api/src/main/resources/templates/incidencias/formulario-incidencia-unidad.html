<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragmentos/head :: comun('Reportar Incidencia - Unidad')}"></th:block>
</head>
<body>
    <div class="contenedor-principal">
        <div th:replace="~{fragmentos/sidebar :: sidebar}"></div>
        
        <main class="contenido-principal">
            <header class="encabezado">
                <div>
                    <h1 class="titulo-pagina">Reportar Daño en Unidad</h1>
                    <p>Registra un desperfecto o daño dentro de una unidad específica</p>
                </div>
                <nav>
                    <a class="boton-secundario" th:href="@{/incidencias}">&larr; Volver</a>
                </nav>
            </header>

            <section th:if="${errorMessage != null}">
                <p class="alerta-error" th:text="${errorMessage}"></p>
            </section>

            <section class="panel">
                <div class="tarjeta tarjeta-estatica">
                    <form th:action="@{/incidencias/unidad}" th:object="${incidenciaForm}" method="post" class="form-contenedor-margen">
                        
                        <div class="fila-formulario">
                            <div class="formulario-grupo grupo-flexible">
                                <label class="formulario-etiqueta" for="condominioId">Seleccionar Condominio</label>
                                <select id="condominioId" class="formulario-entrada" required>
                                    <option value="">Seleccione un condominio...</option>
                                    <option th:each="cond : ${condominios}" th:value="${cond.id}" th:text="${cond.nombre}"></option>
                                </select>
                            </div>

                            <div class="formulario-grupo grupo-flexible">
                                <label class="formulario-etiqueta" for="unidadId">Seleccionar Unidad</label>
                                <select id="unidadId" th:field="*{unidadId}" class="formulario-entrada" required>
                                    <option value="">Seleccione la unidad...</option>
                                    <option th:each="uni : ${unidades}" th:value="${uni.id}" th:data-condominio="${uni.condominio.id}" th:text="${uni.numeroUnidad} + ' - Piso ' + ${uni.piso} + ' - Torre ' + ${uni.torre}"></option>
                                </select>
                                <small class="error-texto" th:if="${#fields.hasErrors('unidadId')}" th:errors="*{unidadId}"></small>
                            </div>
                        </div>

                        <div class="formulario-grupo">
                            <label class="formulario-etiqueta" for="descripcion">Descripción del Problema</label>
                            <textarea id="descripcion" th:field="*{descripcion}" class="formulario-entrada" rows="3" placeholder="Ej: Filtración de agua en la pared principal..." required></textarea>
                            <small class="error-texto" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></small>
                        </div>

                        <div class="fila-formulario">
                            <div class="formulario-grupo grupo-flexible">
                                <label class="formulario-etiqueta" for="causa">Posible Causa</label>
                                <select id="causa" th:field="*{causa}" class="formulario-entrada" required>
                                    <option value="DESGASTE_NATURAL">Desgaste Natural</option>
                                    <option value="MAL_USO">Mal Uso / Negligencia</option>
                                    <option value="VANDALISMO">Vandalismo</option>
                                    <option value="CLIMA">Daño por Clima</option>
                                    <option value="OTRO">Otro</option>
                                </select>
                                <small class="error-texto" th:if="${#fields.hasErrors('causa')}" th:errors="*{causa}"></small>
                            </div>

                            <div class="formulario-grupo grupo-flexible">
                                <label class="formulario-etiqueta" for="gravedad">Gravedad</label>
                                <select id="gravedad" th:field="*{gravedad}" class="formulario-entrada" required>
                                    <option value="LEVE">Leve (No impide uso de la unidad)</option>
                                    <option value="MODERADO">Moderado (Incomodidad alta)</option>
                                    <option value="GRAVE">Grave (Peligro o impide vivir en la unidad)</option>
                                    <option value="CRITICO">Crítico (Emergencia inmediata)</option>
                                </select>
                                <small class="error-texto" th:if="${#fields.hasErrors('gravedad')}" th:errors="*{gravedad}"></small>
                            </div>
                        </div>

                        <div class="formulario-grupo">
                            <label class="formulario-etiqueta">Evidencia Fotográfica (Opcional)</label>
                            <small class="texto-ayuda-evidencia">Máximo 5 imágenes de hasta 10MB (JPG, PNG, WEBP).</small>
                            <input type="file" id="evidenciaArchivos" class="oculto" multiple accept="image/png, image/jpeg, image/webp">
                            <button type="button" id="btnSeleccionarArchivos" class="boton-secundario boton-ancho-completo" data-cloud-name="dxciesoqh" data-upload-preset="condominio_preset">
                                Seleccionar Fotos de Evidencia
                            </button>
                            
                            <div id="evidenciaPreview" class="evidencia-preview">
                            </div>
                            
                            <input type="hidden" id="urlEvidencia" th:field="*{evidenciaUrl}">
                        </div>

                        <div class="contenedor-acciones">
                            <button type="submit" class="boton-primario">Enviar Reporte</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
    
    <link rel="stylesheet" th:href="@{/css/dominios/incidencias/incidencias.css}">

    <script th:src="@{/js/dominios/incidencias/incidencias.js}" defer></script>
</body>
</html>
