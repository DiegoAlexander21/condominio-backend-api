<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: comun('Historial de Titularidad')}"></head>
<body>
    <div class="contenedor-principal">
        <div th:replace="~{fragmentos/sidebar :: sidebar}"></div>
        
        <main class="contenido-principal">
            <header class="encabezado">
                <div>
                    <h1 class="titulo-pagina">Historial de Titularidad</h1>
                    <p>Registro de cambios de dueño y trazabilidad de unidades por condominio.</p>
                </div>
            </header>

            <section th:if="${mensajeExito != null or mensajeError != null}">
                <p class="alerta-exito" th:if="${mensajeExito != null}" th:text="${mensajeExito}"></p>
                <p class="alerta-error" th:if="${mensajeError != null}" th:text="${mensajeError}"></p>
            </section>



            <section class="panel">
                <div class="tarjeta tarjeta-estatica">
                    <h2>Historial de Cambios Registrados</h2>
                    <div class="contenedor-tabla">
                        <table class="tabla-datos">
                            <thead>
                                <tr>
                                    <th>ID Departamento</th>
                                    <th>Dueño Anterior</th>
                                    <th>Dueño Actual</th>
                                    <th>Fecha de Registro</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla">
                                <tr th:if="${#lists.isEmpty(listaHistorial)}">
                                    <td colspan="4">No se han registrado cambios de titularidad aún.</td>
                                </tr>
                                <tr th:each="historial : ${listaHistorial}" class="fila-dato">
                                    <td th:text="${historial.unidad.torre + ' - U. ' + historial.unidad.numeroUnidad}"></td>
                                    <td th:text="${historial.propietarioAnterior}"></td>
                                    <td th:text="${historial.nuevoPropietario}"></td>
                                    <td th:text="${#temporals.format(historial.fechaCambio, 'dd/MM/yyyy HH:mm')}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <link rel="stylesheet" th:href="@{/css/dominios/historial/historial-titularidad.css}">
    <script th:src="@{/js/dominios/historial/historial-titularidad.js}"></script>
</body>
</html>
