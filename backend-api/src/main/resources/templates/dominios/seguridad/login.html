<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <th:block
      th:replace="~{fragmentos/head :: comun('Iniciar Sesión')}"
    ></th:block>
    <link rel="stylesheet" th:href="@{/css/dominios/seguridad/auth.css}" />
  </head>
  <body class="auth-body">
    <div class="tarjeta tarjeta-estatica auth-tarjeta">
      <div class="auth-cabecera">
        <h1 class="titulo-pagina">AypateCond.</h1>
      </div>

      <section th:if="${mensajeExito != null or mensajeError != null}">
        <p
          class="alerta-exito"
          th:if="${mensajeExito != null}"
          th:text="${mensajeExito}"
        ></p>
        <p
          class="alerta-error"
          th:if="${mensajeError != null}"
          th:text="${mensajeError}"
        ></p>
      </section>

      <form
        id="formularioLogin"
        th:action="@{/auth/login}"
        th:object="${loginRequest}"
        method="post"
        novalidate
      >
        <div class="formulario-grupo">
          <label class="formulario-etiqueta" for="identificador"
            >DNI, Correo o Teléfono</label
          >
          <input
            class="formulario-entrada"
            id="identificador"
            type="text"
            th:field="*{identificador}"
            placeholder="Ingresa tu usuario"
            required
          />
          <small
            class="error-texto"
            th:if="${#fields.hasErrors('identificador')}"
            th:errors="*{identificador}"
          ></small>
        </div>

        <div class="formulario-grupo">
          <label class="formulario-etiqueta" for="contrasena"
            >Contraseña</label
          >
          <input
            class="formulario-entrada"
            id="contrasena"
            type="password"
            th:field="*{contrasena}"
            placeholder="Ingresa tu contraseña"
            required
          />
          <small
            class="error-texto"
            th:if="${#fields.hasErrors('contrasena')}"
            th:errors="*{contrasena}"
          ></small>
        </div>

        <div class="contenedor-acciones">
          <button type="submit" class="boton-primario auth-boton-full">
            Ingresar
          </button>
        </div>

        <div class="auth-enlace-secundario">
          <p>
            ¿No tienes cuenta?
            <a th:href="@{/auth/registro}" class="auth-enlace"
              >Regístrate</a
            >
          </p>
        </div>
      </form>
    </div>
  </body>
</html>
