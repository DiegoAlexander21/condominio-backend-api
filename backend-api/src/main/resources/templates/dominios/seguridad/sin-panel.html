<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso no disponible | Sistema de Condominios</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/globales/globales.css}" />
    <link rel="stylesheet" th:href="@{/css/dominios/seguridad/auth.css}" />
    <link rel="stylesheet" th:href="@{/css/dominios/seguridad/sin-panel.css}" />
  </head>
  <body class="auth-body">
    <div class="tarjeta tarjeta-estatica auth-tarjeta text-center">
      <h1 class="sin-panel-titulo">Panel no disponible</h1>
      <p class="sin-panel-descripcion">
        Tu cuenta ha sido creada correctamente, pero el panel para tu
        rol aún no está habilitado en esta versión del sistema.<br /><br />
        Si crees que esto es un error, contacta al administrador del condominio.
      </p>
      <div class="sin-panel-acciones">
        <a th:href="@{/auth/logout}" class="boton-salir-sesion">
          Cerrar Sesión
        </a>
      </div>
    </div>
  </body>
</html>
