<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragmentos/head :: comun('Desglose de Pagos')}"></head>
  <body>
    <div class="contenedor-principal">
      <div th:replace="~{fragmentos/sidebar :: sidebar}"></div>

      <main class="contenido-principal">
        <header class="encabezado">
          <div>
            <h1 class="titulo-pagina">Desglose de Pagos</h1>
            <p>Detalle de abonos registrados en este periodo.</p>
          </div>
          <nav>
            <a class="boton-secundario" th:href="@{/finanzas/estados-cuenta}"
              >Volver a Estados de Cuenta</a
            >
          </nav>
        </header>

        <section class="estadisticas">
          <div class="tarjeta tarjeta-estatica">
            <h3>Unidad</h3>
            <p
              class="tarjeta-valor tarjeta-valor-unidad"
              th:text="${estadoCuenta.unidadDetalles}"
            ></p>
          </div>
          <div class="tarjeta tarjeta-estatica">
            <h3>Periodo</h3>
            <p
              class="tarjeta-valor"
              th:text="${#temporals.format(estadoCuenta.periodo, 'MMMM yyyy')}"
            ></p>
          </div>
        </section>

        <section class="panel" th:if="${pagos != null and !pagos.isEmpty()}">
          <div class="tarjeta tarjeta-estatica tarjeta-margen-inferior">
            <h3>Pagos Realizados</h3>
            <div class="contenedor-tabla">
              <table class="tabla-datos">
                <thead>
                  <tr>
                    <th>Fecha de Pago</th>
                    <th>Monto Pagado</th>
                    <th>Observaciones</th>
                    <th>Comprobante</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="pago : ${pagos}" class="fila-dato">
                    <td
                      th:text="${#temporals.format(pago.fechaPago, 'dd/MM/yyyy')}"
                    ></td>
                    <td
                      class="texto-exito"
                      th:text="'S/ ' + ${pago.monto}"
                    ></td>
                    <td
                      th:text="${pago.observacion != null and !pago.observacion.isBlank() ? pago.observacion : '-'}"
                    ></td>
                    <td>
                      <span
                        th:if="${pago.evidencias == null or pago.evidencias.isEmpty()}"
                        >-</span
                      >
                      <div
                        th:if="${pago.evidencias != null and !pago.evidencias.isEmpty()}"
                        class="contenedor-evidencias"
                      >
                        <a
                          th:each="evidencia, iterStat : ${pago.evidencias}"
                          th:href="${evidencia.urlArchivo}"
                          target="_blank"
                          class="boton-secundario boton-chico"
                          th:title="'Ver Comprobante ' + ${iterStat.count}"
                        >
                          <svg
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          >
                            <path
                              d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                            ></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                          </svg>
                        </a>
                      </div>
                    </td>
                  </tr>
                </tbody>
                <tfoot>
                  <tr>
                    <th colspan="3" class="celda-derecha">
                      Total Deuda Inicial:
                    </th>
                    <th
                      th:text="'S/ ' + ${estadoCuenta.totalCuotas + estadoCuenta.totalExtraordinarios}"
                    ></th>
                  </tr>
                  <tr>
                    <th colspan="3" class="celda-derecha">Total Pagado:</th>
                    <th
                      class="texto-exito"
                      th:text="'S/ ' + ${estadoCuenta.totalPagado}"
                    ></th>
                  </tr>
                  <tr>
                    <th colspan="3" class="celda-derecha">Saldo Pendiente:</th>
                    <th
                      class="texto-alerta"
                      th:text="'S/ ' + ${estadoCuenta.saldo}"
                    ></th>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </section>

        <section class="panel" th:if="${pagos == null or pagos.isEmpty()}">
          <div class="tarjeta tarjeta-estatica">
            <p class="texto-centrado">
              No se han registrado pagos para este estado de cuenta.
            </p>
          </div>
        </section>
      </main>
    </div>

    <link rel="stylesheet" th:href="@{/css/dominios/finanzas/pagos.css(v=7)}" />
    <script
      th:src="@{/js/dominios/finanzas/pagos-formulario.js(v=7)}"
      defer
    ></script>
    <script
      th:src="@{/js/dominios/finanzas/pagos-evidencias.js(v=7)}"
      defer
    ></script>
    <script
      th:src="@{/js/dominios/finanzas/pagos-modal-evidencia.js(v=7)}"
      defer
    ></script>
    <script th:src="@{/js/dominios/finanzas/pagos.js(v=7)}" defer></script>
  </body>
</html>
