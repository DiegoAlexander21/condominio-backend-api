<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragmentos/head :: comun('Registrar Pago')}"></th:block>
</head>
<body>
    <div class="contenedor-principal">
        <div th:replace="~{fragmentos/sidebar :: sidebar}"></div>
        
        <main class="contenido-principal">
            <header class="encabezado">
                <div>
                    <h1 class="titulo-pagina">Registrar Pago</h1>
                    <p>Registra un abono para reducir la deuda de la unidad.</p>
                </div>
                <nav>
                    <a class="boton-secundario" th:href="@{/finanzas/estados-cuenta}">&larr; Volver</a>
                </nav>
            </header>

            <section th:if="${errorMessage != null}">
                <p class="alerta-error" th:text="${errorMessage}"></p>
            </section>

            <section class="panel">
                <div class="nota-informativa">
                    <p class="nota-texto">
                        <strong>Nota informativa:</strong> Al presionar el botón "Pagar Deuda Total", se autocompletará en el input la cantidad total de la deuda pendiente actual.
                    </p>
                </div>
                
                <div class="tarjeta tarjeta-estatica">
                    <form th:action="@{/finanzas/pagos}" th:object="${pagoForm}" method="post" class="form-contenedor-margen">
                        <input type="hidden" th:field="*{unidadId}">
                        <input type="hidden" th:field="*{estadoCuentaId}">
                        
                        <div class="fila-formulario">
                            <div class="formulario-grupo grupo-flexible">
                                <label class="formulario-etiqueta" for="monto">Monto Depositado (S/)</label>
                                <div class="grupo-monto-pago">
                                    <input type="number" step="0.01" id="monto" th:field="*{monto}" class="formulario-entrada entrada-monto" required placeholder="0.00">
                                    <button type="button" class="boton-secundario" id="btnPagoTotal" th:if="${saldoPendiente != null}" th:data-saldo="${saldoPendiente}">Pagar Deuda Total</button>
                                </div>
                                <small class="error-texto" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></small>
                            </div>
                        </div>

                        <div class="formulario-grupo">
                            <label class="formulario-etiqueta">Evidencia Fotográfica (Opcional)</label>
                            <small class="texto-ayuda-evidencia">Máximo 5 imágenes de hasta 10MB (JPG, PNG, WEBP).</small>
                            <input type="file" id="evidenciaArchivos" class="oculto" multiple accept="image/png, image/jpeg, image/webp">
                            <button type="button" id="btnSeleccionarArchivos" class="boton-secundario boton-ancho-completo" data-cloud-name="dxciesoqh" data-upload-preset="condominio_preset">
                                Seleccionar Fotos del Comprobante
                            </button>
                            
                            <div id="evidenciaPreview" class="vista-previa-evidencias">
                            </div>
                            
                            <input type="hidden" id="urlEvidencia" th:field="*{evidenciaUrl}">
                            <small class="error-texto" th:if="${#fields.hasErrors('evidenciaUrl')}" th:errors="*{evidenciaUrl}"></small>
                        </div>

                        <div class="formulario-grupo">
                            <label class="formulario-etiqueta" for="observacion">Observaciones / Número de Operación (Opcional)</label>
                            <textarea id="observacion" th:field="*{observacion}" class="formulario-entrada" rows="2" placeholder="Ej. Depósito BCP Op. 12345"></textarea>
                            <small class="error-texto" th:if="${#fields.hasErrors('observacion')}" th:errors="*{observacion}"></small>
                        </div>

                        <div class="contenedor-acciones">
                            <button type="submit" class="boton-primario">Guardar Pago</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <link rel="stylesheet" th:href="@{/css/dominios/finanzas/pagos.css}">
    <link rel="stylesheet" th:href="@{/css/dominios/incidencias/incidencias.css}">
    <script th:src="@{/js/dominios/finanzas/pagos.js}" defer></script>
</body>
</html>
