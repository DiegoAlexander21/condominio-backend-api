<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <th:block
      th:replace="~{fragmentos/head :: comun('Gestión de Gastos')}"
    ></th:block>
  </head>
  <body>
    <div class="contenedor-principal">
      <div th:replace="~{fragmentos/sidebar :: sidebar}"></div>

      <main class="contenido-principal">
        <header class="encabezado">
          <div>
            <h1 class="titulo-pagina">Gestión de Gastos</h1>
            <p>Visualiza y distribuye los gastos del condominio.</p>
          </div>
          <nav class="pestanas-filtro">
            <a
              th:class="'pestana-filtro ' + (${param.tipo == null or param.tipo[0] == 'FIJO'} ? 'activo' : '')"
              th:href="@{/finanzas/gastos(tipo='FIJO')}"
              >Gastos Fijos</a
            >
            <a
              th:class="'pestana-filtro ' + (${param.tipo != null and param.tipo[0] == 'EXTRAORDINARIO'} ? 'activo' : '')"
              th:href="@{/finanzas/gastos(tipo='EXTRAORDINARIO')}"
              >Gastos Extraordinarios</a
            >
            <a
              class="boton-primario boton-alinear-derecha"
              th:href="@{/finanzas/gastos/nuevo}"
              >Registrar Gasto</a
            >
          </nav>
        </header>

        <section th:if="${mensajeExito != null}">
          <p class="alerta-exito" th:text="${mensajeExito}"></p>
        </section>
        <section th:if="${mensajeError != null}">
          <p class="alerta-error" th:text="${mensajeError}"></p>
        </section>

        <section class="panel">
          <div
            class="tarjeta tarjeta-estatica"
            th:if="${gastos == null or gastos.isEmpty()}"
          >
            <p>No hay gastos registrados para esta categoría.</p>
          </div>

          <div
            class="contenedor-tabla"
            th:if="${gastos != null and !gastos.isEmpty()}"
          >
            <table class="tabla-datos">
              <thead>
                <tr>
                  <th>Descripción</th>
                  <th>Ubicación</th>
                  <th>Monto</th>
                  <th>Distribución</th>
                  <th>Fechas</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="gasto : ${gastos}">
                  <td th:text="${gasto.descripcion}"></td>
                  <td>
                    <span th:text="${gasto.condominioNombre}"></span>
                    <th:block th:if="${gasto.torre != null and !gasto.torre.isEmpty()}">
                      <br><small th:text="'Torre: ' + ${gasto.torre}"></small>
                    </th:block>
                  </td>
                  <td class="texto-exito sin-salto" th:text="'S/ ' + ${gasto.montoTotal}"></td>
                  <td th:text="${gasto.metodoDistribucionFormateado}"></td>
                  <td>
                    <small>Reg: <span th:text="${#temporals.format(gasto.fechaRegistro, 'dd/MM/yyyy')}"></span></small>
                    <th:block th:if="${gasto.fechaLimite != null}">
                      <br><small class="texto-alerta">Vence: <span th:text="${#temporals.format(gasto.fechaLimite, 'dd/MM/yyyy')}"></span></small>
                    </th:block>
                  </td>
                  <td>
                    <div class="celda-acciones">
                      <button
                        th:if="${!gasto.distribuido}"
                        type="button"
                        class="boton-secundario btn-tabla boton-distribuir"
                        th:attr="data-id=${gasto.id}, data-desc=${gasto.descripcion}, data-monto=${gasto.montoTotal}, data-metodo=${gasto.metodoDistribucionFormateado}, data-metodo-raw=${gasto.metodoDistribucion}, data-unidad=${gasto.unidadIdCausante}, data-tipo=${gasto.tipoGasto}"
                      >
                        Distribuir
                      </button>
                      <button
                        th:if="${gasto.distribuido}"
                        type="button"
                        class="boton-secundario btn-tabla boton-deshabilitado-exito"
                        disabled
                      >
                        Distribuido
                      </button>
                      <a
                        th:href="@{/finanzas/gastos/{id}/editar(id=${gasto.id})}"
                        class="boton-secundario btn-tabla"
                        >Editar</a
                      >
                      <form
                        th:action="@{/finanzas/gastos/eliminar}"
                        method="post"
                        class="form-eliminar form-eliminar-en-linea confirmacion-eliminar-gasto"
                      >
                        <input type="hidden" name="id" th:value="${gasto.id}" />
                        <input type="hidden" name="tipoGasto" th:value="${gasto.tipoGasto}" />
                        <button type="submit" class="boton-secundario btn-tabla btn-eliminar">
                          Eliminar
                        </button>
                      </form>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div id="modalDistribucion" class="modal-overlay">
      <div class="modal-contenido">
        <span class="cerrar-modal">&times;</span>
        <h2>Distribuir Gasto</h2>
        <p id="descGastoModal"></p>
        <form
          th:action="@{/finanzas/gastos/distribuir}"
          method="post"
          class="form-contenedor-margen"
        >
          <input type="hidden" id="gastoId" name="gastoId" />
          <input
            type="hidden"
            id="tipoGastoRedirect"
            name="tipoGastoRedirect"
          />
          <div class="formulario-grupo oculto" id="grupoUnidad">
            <label class="formulario-etiqueta" for="unidadId"
              >Seleccionar Unidad (Cobro Directo)</label
            >
            <select id="unidadId" name="unidadId" class="formulario-entrada">
              <option value="">-- Seleccione la unidad responsable --</option>
              <option
                th:each="unidad : ${unidades}"
                th:value="${unidad.id}"
                th:text="${unidad.condominio.nombre} + ' - ' + ${unidad.torre} + ' - Piso ' + ${unidad.piso} + ' - Unidad ' + ${unidad.numeroUnidad}"
              ></option>
            </select>
          </div>
          <button type="submit" class="boton-primario">
            Confirmar Distribución
          </button>
        </form>
      </div>
    </div>

    <link rel="stylesheet" th:href="@{/css/dominios/finanzas/gastos.css}" />
    <script
      th:src="@{/js/dominios/finanzas/gastos-distribucion-modal.js}"
      defer
    ></script>
    <script
      th:src="@{/js/dominios/finanzas/gastos-incidencia.js}"
      defer
    ></script>
    <script th:src="@{/js/dominios/finanzas/gastos-periodo.js}" defer></script>
    <script
      th:src="@{/js/dominios/finanzas/gastos-modal-detalles.js}"
      defer
    ></script>
    <script
      th:src="@{/js/dominios/finanzas/gastos-filtro-torre.js}"
      defer
    ></script>
    <script
      th:src="@{/js/dominios/finanzas/gastos-filtro-incidencia.js}"
      defer
    ></script>
    <script
      th:src="@{/js/dominios/finanzas/gastos-generar-estado.js}"
      defer
    ></script>
    <script th:src="@{/js/dominios/finanzas/gastos-eliminar.js}" defer></script>
    <script th:src="@{/js/dominios/finanzas/gastos.js}" defer></script>
  </body>
</html>
